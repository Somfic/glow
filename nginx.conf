server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for any non-prerendered or client-routed path.
    # All real routes are prerendered to their own .html files; 200.html is
    # the adapter-static SPA shell used only for unknown URLs.
    location / {
        try_files $uri $uri.html $uri/ /200.html;
    }
}
