name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run check

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

  version:
    name: version
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      should_release: ${{ steps.semver.outputs.should_release }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: semver
        run: |
          # Find the latest semver tag or default to 0.1.0
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.1.0"
            MAJOR=0; MINOR=1; PATCH=0
            REF="$(git rev-list --max-parents=0 HEAD)"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            REF="$LATEST_TAG"
          fi

          echo "Latest tag: $LATEST_TAG (${MAJOR}.${MINOR}.${PATCH})"

          # Read commits since last tag
          COMMITS=$(git log "${REF}..HEAD" --pretty=format:"%H %s" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level from commit bodies
          BUMP=""
          BREAKING=""
          FEATURES=""
          FIXES=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            BODY=$(git log -1 --pretty=format:"%b" "$HASH")

            # Check for semver tag in body
            if echo "$BODY" | grep -qi "semver: major"; then
              BUMP="major"
              BREAKING="${BREAKING}- ${SUBJECT}\n"
            elif echo "$BODY" | grep -qi "semver: minor"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
              FEATURES="${FEATURES}- ${SUBJECT}\n"
            elif echo "$BODY" | grep -qi "semver: patch"; then
              [ "$BUMP" != "major" ] && [ "$BUMP" != "minor" ] && BUMP="patch"
              FIXES="${FIXES}- ${SUBJECT}\n"
            fi
          done <<< "$COMMITS"

          if [ -z "$BUMP" ]; then
            echo "No semver tags found in commits"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION ($BUMP bump)"

          # Generate changelog
          CHANGELOG=""
          if [ -n "$BREAKING" ]; then
            CHANGELOG="${CHANGELOG}### Breaking changes\n${BREAKING}\n"
          fi
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### New features\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### Fixes\n${FIXES}\n"
          fi

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

          echo "## Version: ${NEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bump:** ${BUMP}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo -e "$CHANGELOG" >> "$GITHUB_STEP_SUMMARY"

          # Use delimiter for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<${EOF}" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

  release:
    name: release
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit dist and tag
        run: |
          git add dist/
          git commit -m "build: dist for v${{ needs.version.outputs.version }}" || echo "No dist changes"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ needs.version.outputs.changelog }}
